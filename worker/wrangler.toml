name = "runcoach-api"
main = "src/index.ts"
compatibility_date = "2024-03-01"

[vars]
CLERK_JWKS_URL = "https://cuddy-arachnid-40.clerk.accounts.dev/.well-known/jwks.json"

# Secrets (set via `wrangler secret put` or Cloudflare dashboard — never committed):
#   NOTION_API_KEY
#   NOTION_DB_ID
#   STRAVA_CLIENT_ID
#   STRAVA_CLIENT_SECRET
#   ANTHROPIC_API_KEY
#
# KV key conventions:
#   users:{userId}:slug            — Notion "User" select value (set manually per user)
#   users:{userId}:plan_start_date — Training plan start date (set via POST /seed-plan)
#   strava:tokens:{userId}         — Strava OAuth tokens JSON

[[kv_namespaces]]
binding = "RUNNING_KV"
